<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Alunos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<body class="p-4">
<div class="container">
    <h1>Alunos</h1>
    <a href="/alunos/novo" class="btn btn-success mb-3">Novo Aluno</a>
    <table class="table table-bordered">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>E-mail</th>
                <th>Curso</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="aluno : ${alunos}">
                <td th:text="${aluno.id}"></td>
                <Td th:text="${aluno.nome}"></Td>
                <td th:text="${aluno.email}"></td>
                <td th:text="${aluno.curso != null ? aluno.curso.nome : 'Sem Curso'}"></td>
                <td>
                    <a th:href="@{'/alunos/editar/' + ${aluno.id}}" class="btn btn-primary btn-sm">Editar</a>
                    <a th:href="@{'/alunos/excluir/' + ${aluno.id}}" class="btn btn-danger btn-sm"
                        onclick="return confirm('Tem certeza que deseja excluir?')">Excluir</a>
                </td>
        </tbody>
    </table>
</div>

</body>
</html>
