<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Alunos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
<div class="container">
    <h1 th:text="${aluno.id != null} ? 'Editar Aluno' : 'Novo Produto'"></h1>
    <form action="/alunos/salvar" method="post" th:object="${aluno}">
        <input type="hidden" th:field="*{id}">
        <div class="mb-3">
            <label for="nome" class="form-label">Nome</label>
            <input type="text" class="form-control" id="nome" th:field="*{nome}" placeholder="Nome do Aluno" required>

        </div>
        <div class="mb-3">
            <label for="email" class="form-label">E-mail</label>
            <input type="email" class="form-control" id="email" th:field="*{email}" placeholder="Carga Horaria do Curso" required>
        </div>
        <div class="mb-3">
            <label for="curso" class="form-label">Curso</label>
            <select th:field="*{curso.id}" class="form-select" id="curso" required>
                <option th:each="curso : ${cursos}" th:value="${curso.id}" th:text="${curso.nome}"
                        th:selected="${curso.id == aluno.curso?.id}">Curso</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary">Salvar</button>
        <a href="/alunos" class="btn btn-secondary">Cancelar</a>
    </form>

</div>
</body>
</html>
